version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "nix"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "05:00"
      timezone: "Etc/UTC"
    groups:
      nix-inputs:
        patterns:
          - "*"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "chore"
      include: "scope"
